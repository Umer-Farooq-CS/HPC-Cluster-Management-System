worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Resolvers (optional, if using DNS for docker)
    # resolver 127.0.0.11 ipv6=off valid=30s;

    server {
        listen 80;
        server_name localhost 127.0.0.1 192.168.10.2 192.168.20.2 192.168.10.100;

        # Redirect all HTTP requests to HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost 127.0.0.1 192.168.10.2 192.168.20.2 192.168.10.100;

        ssl_certificate /etc/nginx/ssl/hpc-cert.pem;
        ssl_certificate_key /etc/nginx/ssl/hpc-key.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # --- Keycloak IAM ---
        # Crucial for Keycloak to know it's being proxied so redirects work properly
        location /realms/ {
            proxy_pass http://hpc-keycloak:8080/realms/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;

            # Rewrite http:// → https:// in Keycloak OIDC discovery JSON
            sub_filter '"http://192.168.10.2' '"https://192.168.10.2';
            sub_filter '"http://192.168.10.2:443' '"https://192.168.10.2';
            sub_filter_once off;
            sub_filter_types application/json;
        }

        # Keycloak Admin Console
        location /admin/ {
            proxy_pass http://hpc-keycloak:8080/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location /resources/ {
            proxy_pass http://hpc-keycloak:8080/resources/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # --- FastAPI Backend ---
        location /api/ {
            proxy_pass http://hpc-backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for the deployment stream
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400; # Prevent websocket timeout
        }

        # --- React Frontend (Static Build) ---
        location / {
            proxy_pass http://hpc-frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # For React Router to work properly, fallback is handled inside React/Nginx
        }
    }
}
