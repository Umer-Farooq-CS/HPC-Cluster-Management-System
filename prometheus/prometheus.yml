global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'master_node'
    static_configs:
      - targets: ['192.168.10.2:9100']

  - job_name: 'slurm'
    static_configs:
      - targets: ['192.168.10.2:9092']
