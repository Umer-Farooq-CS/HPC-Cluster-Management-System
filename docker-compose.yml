version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hpc-postgres
    environment:
      POSTGRES_DB: hpc_cluster
      POSTGRES_USER: hpc_admin
      POSTGRES_PASSWORD: hpc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hpc-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hpc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hpc-network
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: hpc-keycloak
    environment:
      # Keycloak Database Settings
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/hpc_cluster
      KC_DB_USERNAME: hpc_admin
      KC_DB_PASSWORD: hpc_password
      # Initial Admin User
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Host settings - Keycloak 24 config for Nginx reverse proxy
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      # Trust Nginx X-Forwarded-* headers (Keycloak 24 syntax)
      KC_PROXY_HEADERS: "xforwarded"
      KC_HOSTNAME: "192.168.10.2"
    volumes:
      - ./backend/keycloak-themes/hpc-theme:/opt/keycloak/themes/hpc-theme:ro
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - hpc-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: hpc-backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - keycloak
    networks:
      - hpc-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://${DOMAIN}/api/v1
        - VITE_WS_URL=wss://${DOMAIN}/api/v1
    container_name: hpc-frontend
    env_file: .env
    depends_on:
      - backend
    networks:
      - hpc-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: hpc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - hpc-network
    restart: unless-stopped

  celery_worker:
    build: ./backend
    container_name: hpc-celery-worker
    env_file: .env
    command: celery -A core.celery_app worker --beat --loglevel=info
    depends_on:
      - postgres
      - redis
    networks:
      - hpc-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: hpc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - hpc-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: hpc-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SERVER_ROOT_URL=https://192.168.10.100/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Keycloak
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=grafana
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://192.168.10.100/realms/master/protocol/openid-connect/auth
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=http://hpc-keycloak:8080/realms/master/protocol/openid-connect/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=http://hpc-keycloak:8080/realms/master/protocol/openid-connect/userinfo
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - keycloak
    networks:
      - hpc-network
    restart: unless-stopped

networks:
  hpc-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
