---
- name: Install and Configure Open OnDemand
  hosts: localhost
  connection: local
  become: yes
  vars:
    ood_domain: "192.168.10.2"
    ood_port: "8443"
    keycloak_realm: "hpc"
    keycloak_client_id: "open-ondemand"
    oidc_client_secret: "REPLACE_WITH_KEYCLOAK_CLIENT_SECRET"  # Get from Keycloak Admin Console: hpc realm → Clients → open-ondemand → Credentials
    slurm_cluster_name: "hpc-cluster"

  tasks:
    - name: Ensure Slurm and SlurmDBD are active (mock check or real)
      systemd:
        name: slurmctld
        state: started
      ignore_errors: yes

    - name: Install EPEL release
      dnf:
        name: epel-release
        state: present

    - name: Allow SHA1 crypto policy for legacy GPG keys (AlmaLinux 9)
      command: update-crypto-policies --set DEFAULT:SHA1
      when: ansible_distribution_major_version == '9'

    - name: Import OSC RPM-GPG-KEY
      rpm_key:
        state: present
        key: https://yum.osc.edu/ondemand/RPM-GPG-KEY-ondemand


    - name: Install OOD Repository for EL9
      dnf:
        name: https://yum.osc.edu/ondemand/4.2/ondemand-release-web-4.2-1.el9.noarch.rpm
        state: present
        disable_gpg_check: yes
      when: ansible_distribution_major_version == '9'

    - name: Install OOD Repository for EL8
      dnf:
        name: https://yum.osc.edu/ondemand/4.2/ondemand-release-web-4.2-1.el8.noarch.rpm
        state: present
        disable_gpg_check: yes
      when: ansible_distribution_major_version == '8'

    - name: Enable required Node.js and Ruby modules for OOD 4.2 (AlmaLinux 9)
      command: dnf module enable -y nodejs:22 ruby:3.3
      when: ansible_distribution_major_version == '9'

    - name: Install Open OnDemand package and OIDC module
      dnf:
        name:
          - ondemand
          - ondemand-selinux
          - mod_auth_openidc
          - mod_ssl
        state: present

    - name: Create cluster config directory
      file:
        path: /etc/ood/config/clusters.d
        state: directory
        mode: '0755'

    - name: Configure Slurm Cluster for OOD
      copy:
        dest: /etc/ood/config/clusters.d/{{ slurm_cluster_name }}.yml
        content: |
          v2:
            metadata:
              title: "HPC Local Cluster"
            login:
              host: "localhost"
            job:
              adapter: "slurm"
              cluster: "{{ slurm_cluster_name }}"
              bin: "/usr/bin"
              conf: "/etc/slurm/slurm.conf"

    - name: Ensure admin user exists with a home directory
      user:
        name: admin
        password: "{{ 'admin' | password_hash('sha512') }}"
        state: present
        create_home: yes
        shell: /bin/bash

    - name: Ensure admin home directory permissions are correct
      file:
        path: /home/admin
        owner: admin
        group: admin
        mode: '0700'
        state: directory

    - name: Fix SELinux context on admin home
      command: restorecon -R -v /home/admin
      register: restorecon_out
      changed_when: '"Relabeled" in restorecon_out.stdout'

    - name: Create hook script to auto-create home directories
      copy:
        dest: /etc/ood/config/create_user_home.sh
        mode: '0755'
        content: |
          #!/bin/bash
          # Parse arguments
          while [[ "$#" -gt 0 ]]; do
              case $1 in
                  -u|--user) username="$2"; shift ;;
                  *) echo "Unknown parameter passed: $1" >&2; exit 1 ;;
              esac
              shift
          done
          if [ -z "$username" ]; then
              echo "Error: username is required" >&2
              exit 1
          fi
          homedir=$(getent passwd "$username" | cut -d: -f6)
          if [ -z "$homedir" ]; then
              echo "Error: user $username not found" >&2
              exit 1
          fi
          if [ ! -d "$homedir" ]; then
              echo "Creating home directory $homedir for user $username"
              mkdir -p "$homedir"
              cp -rT /etc/skel/ "$homedir/"
              chown -R "$username":"$username" "$homedir"
              chmod 700 "$homedir"
          fi
          restorecon -R "$homedir"

    - name: Create htpasswd file for Basic Auth
      command: htpasswd -Bbc /etc/ood/config/htpasswd admin admin
      args:
        creates: /etc/ood/config/htpasswd

    - name: Ensure htpasswd has correct permissions
      file:
        path: /etc/ood/config/htpasswd
        owner: apache
        group: apache
        mode: '0640'

    - name: Generate self-signed SSL certificate for OOD
      command: openssl req -new -newkey rsa:2048 -days 365 -nodes -x509 -keyout /etc/pki/tls/private/ood.key -out /etc/pki/tls/certs/ood.crt -subj "/C=US/ST=State/L=City/O=HPC/CN={{ ood_domain }}"
      args:
        creates: /etc/pki/tls/certs/ood.crt

    - name: Configure OOD Portal (ood_portal.yml) with Keycloak OIDC
      copy:
        dest: /etc/ood/config/ood_portal.yml
        content: |
          # =========================================================
          # Open OnDemand Portal Configuration
          # Authentication: Keycloak OIDC via mod_auth_openidc
          # =========================================================

          port: {{ ood_port }}
          servername: '{{ ood_domain }}'

          # SSL Configuration
          ssl:
            - 'SSLCertificateFile "/etc/pki/tls/certs/ood.crt"'
            - 'SSLCertificateKeyFile "/etc/pki/tls/private/ood.key"'

          # Allow embedding in iframes from the management portal
          security_csp_frame_ancestors: "https://{{ ood_domain }} https://localhost"

          # --------------------------------------------------------
          # OIDC (Keycloak) Authentication via mod_auth_openidc
          # --------------------------------------------------------
          oidc_uri: /oidc
          oidc_provider_metadata_url: "https://{{ ood_domain }}/realms/{{ keycloak_realm }}/.well-known/openid-configuration"
          oidc_client_id: "{{ keycloak_client_id }}"
          oidc_client_secret: "{{ oidc_client_secret }}"
          oidc_remote_user_claim: "preferred_username"
          oidc_scope: "openid profile email"
          oidc_session_inactivity_timeout: 28800
          oidc_session_max_duration: 28800
          oidc_state_max_number_of_cookies: "10 true"
          oidc_cookie_same_site: "Off"

          auth:
            - "AuthType openid-connect"
            - "Require valid-user"

          # Enable hook script to auto-create home directories on first login
          pun_pre_hook_root_cmd: "/etc/ood/config/create_user_home.sh"


    - name: Configure global OIDC SSL validation
      copy:
        dest: /etc/httpd/conf.d/ood-oidc-ssl.conf
        content: |
          # Disable SSL server validation for self-signed certificates in mod_auth_openidc
          OIDCSSLValidateServer Off
        owner: root
        group: apache
        mode: '0640'

    - name: Update OOD Portal Apache Config
      command: /opt/ood/ood-portal-generator/sbin/update_ood_portal

    - name: Remove default Listen 80 from Apache to avoid conflict with Nginx
      lineinfile:
        path: /etc/httpd/conf/httpd.conf
        regexp: '^Listen 80'
        state: absent

    - name: Remove default Listen 443 from Apache SSL config to avoid conflict with Nginx
      lineinfile:
        path: /etc/httpd/conf.d/ssl.conf
        regexp: '^Listen 443'
        state: absent

    - name: Explicitly add Listen for OOD port
      copy:
        dest: /etc/httpd/conf.d/ood-listen.conf
        content: |
          Listen {{ ood_port }}

    - name: Allow Apache to connect to Keycloak via network (SELinux)
      seboolean:
        name: httpd_can_network_connect
        state: yes
        persistent: yes

    - name: Allow Apache and OnDemand to read home directories and system tools (SELinux)
      seboolean:
        name: "{{ item }}"
        state: yes
        persistent: yes
      loop:
        - httpd_enable_homedirs
        - httpd_read_user_content
        - use_nfs_home_dirs
        - ondemand_manage_user_home_dir
        - ondemand_use_slurm

    - name: Enable pam_mkhomedir in sshd PAM config
      lineinfile:
        path: /etc/pam.d/sshd
        line: "session optional pam_mkhomedir.so skel=/etc/skel umask=077"
        state: present

    - name: Create custom SELinux policy file for OOD
      copy:
        dest: /tmp/ood_custom.te
        content: |
          module ood_custom 1.0;

          require {
              type ood_pun_t;
              type config_home_t;
              type systemd_userdbd_runtime_t;
              type user_home_t;
              type user_home_dir_t;
              class dir { read write create getattr setattr search open add_name remove_name rmdir };
              class file { read write create getattr setattr open unlink link rename map };
              class sock_file { write };
              class process { setfscreate };
          }

          # Allow ood_pun_t to manage config_home_t (directories and files)
          allow ood_pun_t config_home_t:dir { read write create getattr setattr search open add_name remove_name rmdir };
          allow ood_pun_t config_home_t:file { read write create getattr setattr open unlink link rename };

          # Allow ood_pun_t to read systemd userdbd runtime directories and socket files
          allow ood_pun_t systemd_userdbd_runtime_t:dir { read search open };
          allow ood_pun_t systemd_userdbd_runtime_t:sock_file { write };

          # Allow ood_pun_t process setfscreate
          allow ood_pun_t self:process { setfscreate };

          # Allow ood_pun_t to memory-map user home files (required for SQLite WAL / SHM)
          allow ood_pun_t user_home_t:file { map };
          allow ood_pun_t user_home_dir_t:file { map };

    - name: Compile custom SELinux policy module
      command: checkmodule -M -m -o /tmp/ood_custom.mod /tmp/ood_custom.te

    - name: Package custom SELinux policy module
      command: semodule_package -o /tmp/ood_custom.pp -m /tmp/ood_custom.mod

    - name: Install custom SELinux policy module
      command: semodule -i /tmp/ood_custom.pp

    - name: Enable and restart HTTPD (Apache for OOD)
      systemd:
        name: httpd
        state: restarted
        enabled: yes

    - name: Restore default crypto policy (AlmaLinux 9)
      command: update-crypto-policies --set DEFAULT
      when: ansible_distribution_major_version == '9'
